services:
  skill-market-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: cnwinds/skill-market-server:local
    container_name: skill-market-server
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3100
      NODE_ENV: production
      REGISTRY_ROOT: /app/registry
      REGISTRY_SEED_ROOT: /app/registry-seed
    ports:
      - "3100:3100"
    volumes:
      - ./data/registry:/app/registry
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3100/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  skill-market-web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    image: cnwinds/skill-market-web:local
    container_name: skill-market-web
    restart: unless-stopped
    depends_on:
      skill-market-server:
        condition: service_healthy
    ports:
      - "7080:80"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1/"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
